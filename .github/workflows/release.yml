name: Release — Build & Publish EXE + APK

# Builds the Windows installer (NSIS + portable) and the Android debug APK
# on every git tag v*, then publishes both artifacts to GitHub Releases.
# You ship a new version by running: git tag v1.2.0 && git push --tags

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required by softprops/action-gh-release to create the release

jobs:
  build-windows:
    name: Build Windows EXE (NSIS + Portable)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Application (Vite)
        run: npm run build

      - name: Build Electron Installers
        run: npx electron-builder --win nsis portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MYRAA-Windows-EXE
          path: |
            dist_electron/*.exe
            dist_electron/latest.yml
          if-no-files-found: error

  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Application (Vite)
        run: npm run build

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Grant Execute Permission for Gradle Wrapper
        run: cd android && chmod +x gradlew

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MYRAA-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.exe' -o -name '*.apk' -o -name 'latest.yml' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.apk
            release/latest.yml
